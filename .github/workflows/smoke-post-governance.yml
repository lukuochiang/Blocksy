name: smoke-post-governance

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/smoke-post-governance.yml"
      - "blocksy-server/**"
      - "scripts/regression_post_governance_flow.sh"
  pull_request:
    paths:
      - ".github/workflows/smoke-post-governance.yml"
      - "blocksy-server/**"
      - "scripts/regression_post_governance_flow.sh"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: blocksy
          POSTGRES_USER: blocksy
          POSTGRES_PASSWORD: blocksy123
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U blocksy -d blocksy"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Start MinIO
        run: |
          docker run -d --name blocksy-minio \
            -p 9000:9000 \
            -p 9001:9001 \
            -e MINIO_ROOT_USER=admin \
            -e MINIO_ROOT_PASSWORD=Admin@123456 \
            minio/minio:RELEASE.2024-01-16T16-07-38Z server /data --console-address ":9001"
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:9000/minio/health/live >/dev/null; then
              echo "minio is ready"
              exit 0
            fi
            sleep 2
          done
          echo "minio start timeout"
          docker logs blocksy-minio || true
          exit 1

      - name: Start blocksy-server
        run: |
          cd blocksy-server
          nohup mvn -q spring-boot:run > ../server.log 2>&1 &

      - name: Wait for server health
        run: |
          for i in $(seq 1 120); do
            if curl -fsS http://localhost:8080/api/health >/dev/null; then
              echo "server is ready"
              exit 0
            fi
            sleep 2
          done
          echo "server start timeout"
          tail -n 200 server.log || true
          exit 1

      - name: Run post governance smoke
        run: |
          bash scripts/regression_post_governance_flow.sh

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-server-log
          path: server.log

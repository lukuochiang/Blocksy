server:
  port: 8080

spring:
  application:
    name: blocksy-server
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: true

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    banner: false

blocksy:
  security:
    admin-usernames: ${BLOCKSY_ADMIN_USERNAMES:demo}
    template-manager-usernames: ${BLOCKSY_TEMPLATE_MANAGER_USERNAMES:demo}
    jwt:
      secret: ${BLOCKSY_JWT_SECRET:BlocksyMvpSecretKeyForJwtSignMustBeLongEnough123}
      expiration-seconds: ${BLOCKSY_JWT_EXPIRE_SECONDS:86400}
  analytics:
    default-window-days: ${BLOCKSY_ANALYTICS_DEFAULT_WINDOW_DAYS:7}
    max-window-days: ${BLOCKSY_ANALYTICS_MAX_WINDOW_DAYS:90}

minio:
  endpoint: ${BLOCKSY_MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${BLOCKSY_MINIO_ACCESS_KEY:admin}
  secret-key: ${BLOCKSY_MINIO_SECRET_KEY:Admin@123456}
  bucket-name: ${BLOCKSY_MINIO_BUCKET:blocksy-media}
  public-url: ${BLOCKSY_MINIO_PUBLIC_ENDPOINT:http://localhost:9000}

logging:
  level:
    root: info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

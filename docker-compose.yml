services:
  blocksy-postgres:
    image: postgres:16
    container_name: blocksy-postgres
    environment:
      POSTGRES_DB: blocksy
      POSTGRES_USER: blocksy
      POSTGRES_PASSWORD: blocksy123
    ports:
      - "5432:5432"
    volumes:
      - blocksy-postgres-data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blocksy -d blocksy"]
      interval: 10s
      timeout: 5s
      retries: 10

  blocksy-redis:
    image: redis:7
    container_name: blocksy-redis
    ports:
      - "6379:6379"
    volumes:
      - blocksy-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  blocksy-minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: blocksy-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: Admin@123456
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - blocksy-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  blocksy-postgres-data:
  blocksy-redis-data:
  blocksy-minio-data:
